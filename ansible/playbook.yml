---
- name: "Provisioning Docker Environment on Proxmox LXC (Anti-Permission-Error Version)"
  hosts: lxc_servers
  become: yes
  tasks:
    - name: Wait for SSH to be ready
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        delay: 5
        timeout: 300

    - name: "Update apt repository cache"
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: "Install required system packages"
      apt:
        pkg:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - rsync  # Penting untuk pengiriman file yang stabil
        state: present

    - name: Create directory for Docker key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    # --- BAGIAN PALING PENTING (SOLUSI ERROR PERMISSION DENIED) ---
    - name: "Configure Docker to use VFS storage driver (LXC Workaround)"
      copy:
        dest: "/etc/docker/daemon.json"
        content: |
          {
            "storage-driver": "vfs"
          }
        mode: '0644'
    - name: "Install Docker Compose Standalone (Optional for Legacy Support)"
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'