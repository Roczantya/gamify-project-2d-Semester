version: '3.8'
services:
  item-db:
  image: mysql:5.7
  container_name: item-db
  ports:
    - "3306:3306"
  environment:
    MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    MYSQL_DATABASE: gamify

  item-app-backend:
    build: ./backend
    container_name: item-app-backend
    ports:
      - "8081:8080" # Backend aman di 8081
    depends_on:
      - item-db
    environment:
      - MONGO_URL=mongodb://item-db:27017/gamify

  item-app-frontend:
    build: ./frontend
    container_name: item-app-frontend
    ports:
      - "8082:80"   # <--- UBAH INI (Tadinya 8080)
    depends_on:
      - item-app-backend